<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Category</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        margin: 0;
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: #333;
      }

      form {
        max-width: 400px;
        margin: 0 auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      }

      input[type="number"],
      input[type="text"] {
        width: 100%;
        padding: 10px;
        margin-top: 8px;
        margin-bottom: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
      }

      label {
        font-weight: bold;
        color: #555;
      }

      button {
        width: 100%;
        padding: 12px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: #0056b3;
      }

      p {
        text-align: center;
        font-size: 14px;
      }

      p[style] {
        font-weight: bold;
      }
    </style>
  </head>
  <body>

    <h2>Update Category</h2>

    <!-- Error Message -->
    {% if error %}
      <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form action="" method="POST">
      {% csrf_token %}

      <!-- Category ID -->
      <input
        type="number"
        name="cid"
        placeholder="Enter a category id"
        required
      />

      <!-- Category Name -->
      <label>Other Category</label>
      <input
        type="text"
        name="cname"
        placeholder="Enter category name"
        value="{{ c.cname|default:'' }}"
        required
      />

      <button type="submit">Update Records</button>
    </form>

  </body>
</html>
