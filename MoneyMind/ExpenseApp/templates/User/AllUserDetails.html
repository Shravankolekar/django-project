<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Details About User</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Sr No</th>
                <th>User Name </th>
                <th>Email ID</th>
                <th>Password</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{u.id}}</td>
                <td>{{u.username}}</td>
                <td>{{u.email}}</td>
                <td>{{u.password}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
