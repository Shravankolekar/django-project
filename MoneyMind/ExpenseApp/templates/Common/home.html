<!DOCTYPE html>
<html>
<head>
    <title>MoneyMind Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
        }

        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
        }

        .container {
            margin-top: 30px;
        }

        .card {
            display: inline-block;
            width: 250px;
            padding: 20px;
            margin: 15px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        .card a {
            text-decoration: none;
            color: white;
            background-color: #3498db;
            padding: 10px 15px;
            display: inline-block;
            margin-top: 10px;
            border-radius: 5px;
        }

        .card a:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<h1>💰 MoneyMind Dashboard</h1>

<div class="container">

    <div class="card">
        <h3>User</h3>
        <a href="/AllUserdetails/">View Users</a>
    </div>

    <div class="card">
        <h3>Category</h3>
        <a href="/addcategory/">Add Category</a><br><br>
        <a href="/showallcategory/">Show Category</a>
    </div>

    <div class="card">
        <h3>Expense</h3>
        <a href="/addexpense/">Add Expense</a><br><br>
        <a href="/showallexpencess/">Show Expenses</a>
    </div>

    <div class="card">
        <h3>Budget</h3>
        <a href="/setbudget/">Set Budget</a><br><br>
        <a href="/searchbudgetrecords/">Search Budget</a>
    </div>

    <div class="card">
        <h3>Reports</h3>
        <a href="/anylize/">Analyze Expense</a>
    </div>

    <div class="card">
        <h3>Search</h3>
        <a href="/searchcategoryrecord/">Search Category</a><br><br>
        <a href="/searchdata/">Search Expense</a>
    </div>

</div>

</body>
</html>
