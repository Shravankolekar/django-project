<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Budget</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #89f7fe, #66a6ff);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 50px;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        form {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 350px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            border-color: #66a6ff;
            outline: none;
            box-shadow: 0 0 5px rgba(102, 166, 255, 0.8);
        }

        button {
            background: #66a6ff;
            border: none;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #4a8bd4;
        }

        p {
            color: red;
            margin-top: 10px;
        }

        table {
            margin-top: 30px;
            border-collapse: collapse;
            width: 80%;
            max-width: 800px;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #66a6ff;
            color: #fff;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }
    </style>
</head>
<body>

<h2>Search Budget Record</h2>

<form method="POST">
    {% csrf_token %}
    <input type="number" name="bid" placeholder="Enter Budget ID" required>
    <button type="submit">Search</button>

    {% if error %}
        <p><b>{{error}}</b></p>
    {% endif %}
</form>

{% if a %}
<table>
    <thead>
        <tr>
            <th>Budget Id</th>
            <th>User Id</th>
            <th>Monthly Limit</th>
            <th>Month</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>{{a.bid}}</td>
            <td>{{a.uid}}</td>
            <td>{{a.monthly_limit}}</td>
            <td>{{a.month}}</td>
        </tr>
    </tbody>
</table>
{% endif %}

</body>
</html>
