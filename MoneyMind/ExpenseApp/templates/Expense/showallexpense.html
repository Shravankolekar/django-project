<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Show all Expencess Records</title>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>Expances ID</th>
                <th>User Name</th>
                <th>Category Name</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Date</th>
            </tr>
        </thead>
        
        
        <tbody>
            {% for e in Expenses %}
            <tr>
                <td>{{e.eid}}</td>
                <td>{{e.uid}}</td>
                <td>{{e.cid}}</td>
                <td>{{e.amount}}</td>
                <td>{{e.description}}</td>
                <td>{{e.date}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
        
</body>
</html>
